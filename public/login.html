<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskChecker - Giriş</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-wrap" x-data="{ password: '', error: '', loading: false }">
        <div class="login-card">
            <div class="login-logo">TC</div>
            <h1 class="login-title">TaskChecker</h1>
            <p class="login-sub">Giriş yapın</p>
            <form @submit.prevent="loading=true; fetch('/api/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})}).then(r=>r.json()).then(d=>{loading=false;if(d.token){localStorage.setItem('token',d.token);location.href='/'}else{error='Geçersiz şifre'}}).catch(()=>{loading=false;error='Bağlantı hatası'})">
                <input type="password" x-model="password" class="login-input" placeholder="Şifre" autofocus>
                <p x-show="error" x-text="error" class="login-error"></p>
                <button type="submit" class="login-btn" :disabled="loading">
                    <span x-show="!loading">Giriş</span>
                    <span x-show="loading">...</span>
                </button>
            </form>
        </div>
    </div>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</body>
</html>
