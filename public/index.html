<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskChecker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="/assets/style.css" rel="stylesheet">
</head>
<body>

<div class="app" x-data="taskApp()" x-init="init()" @keydown.window="handleKey($event)">

<nav class="nav">
    <div class="nav-inner">
        <div class="nav-brand">
            <div class="nav-logo">TC</div>
            <span class="nav-title">TaskChecker</span>
        </div>
        <div class="nav-actions">
            <div class="live-badge"><span class="live-dot"></span> Live</div>
            <button @click="logout()" class="nav-btn">Çıkış</button>
        </div>
    </div>
</nav>

<main class="main">

    <div class="overdue-banner" x-show="overdueCount > 0" x-transition>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span><b x-text="overdueCount">0</b> gecikmiş task var</span>
        <button @click="filter='active';sortField='dueDate'" class="overdue-link">Göster</button>
    </div>

    <section class="hero-card">
        <div>
            <p class="hero-kicker">Today</p>
            <h1 class="hero-title">Takibini kaybetmeden ilerle.</h1>
            <p class="hero-copy">Kategori, etiket, bitiş tarihi ve durum akışı ile işleri düzenli tut.</p>
        </div>
        <div class="hero-progress">
            <div class="hero-progress-head">
                <span>Tamamlanma</span>
                <strong><span x-text="Math.round(completionRate)">0</span>%</strong>
            </div>
            <div class="hero-progress-track">
                <div class="hero-progress-fill" :style="'width:' + completionRate + '%' "></div>
            </div>
            <div class="hero-progress-meta">
                <span><span x-text="completedCount">0</span> bitti</span>
                <span><span x-text="overdueCount">0</span> gecikmiş</span>
            </div>
        </div>
    </section>

    <section class="stats-row">
        <div class="scard" @click="filter='all';searchQuery=''" :class="{'scard-active': filter==='all' && !searchQuery}">
            <div class="scard-val" x-text="tasks.length">0</div>
            <div class="scard-lbl">Toplam</div>
        </div>
        <div class="scard" @click="filter='active'" :class="{'scard-active': filter==='active'}">
            <div class="scard-val scard-active-val" x-text="activeCount">0</div>
            <div class="scard-lbl">Aktif</div>
        </div>
        <div class="scard" @click="filter='in_progress'" :class="{'scard-active': filter==='in_progress'}">
            <div class="scard-val scard-progress-val" x-text="inProgressCount">0</div>
            <div class="scard-lbl">Devam</div>
        </div>
        <div class="scard" @click="filter='completed'" :class="{'scard-active': filter==='completed'}">
            <div class="scard-val scard-done-val" x-text="completedCount">0</div>
            <div class="scard-lbl">Bitti</div>
        </div>
    </section>

    <section class="progress-section" x-show="tasks.length > 0" x-transition>
        <div class="bar-row">
            <div class="bar-item">
                <div class="bar-head"><span>Aktif</span><span x-text="activeCount">0</span></div>
                <div class="bar-track"><div class="bar-fill bar-fill-active" :style="'width:'+(tasks.length?activeCount/tasks.length*100:0)+'%'"></div></div>
            </div>
            <div class="bar-item">
                <div class="bar-head"><span>Devam</span><span x-text="inProgressCount">0</span></div>
                <div class="bar-track"><div class="bar-fill bar-fill-progress" :style="'width:'+(tasks.length?inProgressCount/tasks.length*100:0)+'%'"></div></div>
            </div>
            <div class="bar-item">
                <div class="bar-head"><span>Bitti</span><span x-text="completedCount">0</span></div>
                <div class="bar-track"><div class="bar-fill bar-fill-done" :style="'width:'+(tasks.length?completedCount/tasks.length*100:0)+'%'"></div></div>
            </div>
        </div>
    </section>

    <section class="tasks-section">
        <div class="toolbar">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" x-model="searchQuery" class="search-input" placeholder="Ara...">
                <button x-show="searchQuery" @click="searchQuery=''" class="search-clear">&times;</button>
            </div>
            <div class="toolbar-actions">
                <select x-model="sortField" class="sort-select">
                    <option value="createdAt">En yeni</option>
                    <option value="priority">Öncelik</option>
                    <option value="dueDate">Bitiş tarihi</option>
                </select>
                <button @click="showAddModal=true" class="add-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Yeni
                </button>
            </div>
        </div>

            <div class="filter-tabs">
                <button @click="filter='all'" :class="{'seg-active':filter==='all'}">Tümü <span class="seg-count" x-text="tasks.length" x-show="tasks.length"></span></button>
                <button @click="filter='active'" :class="{'seg-active':filter==='active'}">Aktif <span class="seg-count" x-text="activeCount" x-show="activeCount"></span></button>
                <button @click="filter='in_progress'" :class="{'seg-active':filter==='in_progress'}">Devam <span class="seg-count" x-text="inProgressCount" x-show="inProgressCount"></span></button>
                <button @click="filter='completed'" :class="{'seg-active':filter==='completed'}">Bitti <span class="seg-count" x-text="completedCount" x-show="completedCount"></span></button>
            </div>

            <div class="cat-chips" x-show="categories.length > 0">
                <button @click="selectedCategory=null" class="chip" :class="{'chip-active': selectedCategory === null}">Tümü</button>
                <template x-for="cat in categories" :key="cat">
                    <button @click="selectedCategory = selectedCategory === cat ? null : cat" class="chip" :class="{'chip-active': selectedCategory === cat}" x-text="cat"></button>
                </template>
            </div>

            <div class="task-list">
            <template x-for="task in sortedTasks" :key="task.id">
                <div class="tcard" :class="{'tcard-done': task.status==='completed', 'tcard-cancel': task.status==='cancelled', 'tcard-overdue': isOverdue(task)}" @click="openDetail(task)">
                    <button @click.stop="toggleComplete(task)" class="tcheck" :class="{'tcheck-on': task.status==='completed', 'tcheck-wip': task.status==='in_progress'}">
                        <svg x-show="task.status==='completed'" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <svg x-show="task.status==='in_progress'" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
                    </button>
                    <div class="tcard-body">
                        <div class="tcard-top">
                            <span class="tcard-title" :class="{'tcard-title-done': task.status==='completed'}" x-text="task.title"></span>
                            <span class="tcard-badge" :class="'pri-'+task.priority" x-text="task.priority === 'critical' ? 'kritik' : task.priority === 'high' ? 'yüksek' : task.priority === 'medium' ? 'normal' : 'düşük'"></span>
                        </div>
                        <p x-show="task.description" x-text="task.description" class="tcard-desc" x-transition></p>
                        <div class="tcard-meta">
                            <span x-show="task.category" class="tcard-cat" x-text="task.category"></span>
                            <template x-for="tag in task.tags" :key="tag">
                                <span class="tcard-tag" x-text="tag"></span>
                            </template>
                            <span x-show="task.dueDate" class="tcard-due" :class="{'tcard-due-overdue': isOverdue(task)}" x-text="formatDue(task.dueDate)"></span>
                            <span class="tcard-time" x-text="formatDate(task.createdAt)"></span>
                        </div>
                    </div>
                    <div class="tcard-status-col">
                        <span class="status-dot" :class="'sd-'+task.status"></span>
                    </div>
                </div>
            </template>
            <div x-show="sortedTasks.length===0" class="empty" x-transition>
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 11l3 3L22 4"/></svg>
                <p>Task bulunamadı</p>
            </div>
        </div>
    </section>
</main>

<div x-show="showAddModal" class="overlay" @click.self="showAddModal=false" x-transition.opacity>
    <div class="modal" x-transition>
        <div class="modal-head">
            <h2>Yeni Task</h2>
            <button @click="showAddModal=false" class="modal-x">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <label class="field">
                <span class="field-label">Başlık</span>
                <input type="text" x-model="newTask.title" class="field-input" placeholder="Task başlığı..." @keydown.enter="addTask()">
            </label>
            <label class="field">
                <span class="field-label">Açıklama</span>
                <textarea x-model="newTask.description" class="field-input" placeholder="Opsiyonel..." rows="2"></textarea>
            </label>
            <div class="field-row">
                <label class="field half">
                    <span class="field-label">Kategori</span>
                    <input type="text" x-model="newTask.category" class="field-input" placeholder="Proje adı...">
                </label>
                <label class="field half">
                    <span class="field-label">Bitiş tarihi</span>
                    <input type="date" x-model="newTask.dueDate" class="field-input">
                </label>
            </div>
            <label class="field">
                <span class="field-label">Etiketler</span>
                <input type="text" x-model="newTask.tagsInput" class="field-input" placeholder="Virgülle ayır: tasarım, bug">
            </label>
            <label class="field">
                <span class="field-label">Öncelik</span>
                <div class="priority-picker">
                    <button @click="newTask.priority='low'" :class="{'pp-active': newTask.priority==='low'}" class="pp pp-low">Düşük</button>
                    <button @click="newTask.priority='medium'" :class="{'pp-active': newTask.priority==='medium'}" class="pp pp-med">Normal</button>
                    <button @click="newTask.priority='high'" :class="{'pp-active': newTask.priority==='high'}" class="pp pp-high">Yüksek</button>
                    <button @click="newTask.priority='critical'" :class="{'pp-active': newTask.priority==='critical'}" class="pp pp-crit">Kritik</button>
                </div>
            </label>
        </div>
        <div class="modal-foot">
            <button @click="showAddModal=false" class="btn-sec">İptal</button>
            <button @click="addTask()" class="btn-pri">Ekle</button>
        </div>
    </div>
</div>

<div x-show="showDetailModal && detailTask" class="overlay" @click.self="closeDetail()" x-transition.opacity>
    <div class="modal modal-detail" x-transition>
        <template x-if="detailTask">
            <div>
                <div class="modal-head">
                    <h2 x-text="detailTask?.title || ''">Task Detayı</h2>
                    <button @click="closeDetail()" class="modal-x">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="detail-row">
                        <span class="detail-label">Durum</span>
                        <div class="status-picker">
                            <button @click="changeStatus('active')" :class="{'sp-active': detailTask?.status==='active'}" class="sp sp-active-status">Aktif</button>
                            <button @click="changeStatus('in_progress')" :class="{'sp-active': detailTask?.status==='in_progress'}" class="sp sp-wip-status">Devam</button>
                            <button @click="changeStatus('completed')" :class="{'sp-active': detailTask?.status==='completed'}" class="sp sp-done-status">Bitti</button>
                            <button @click="changeStatus('cancelled')" :class="{'sp-active': detailTask?.status==='cancelled'}" class="sp sp-cancel-status">İptal</button>
                        </div>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Öncelik</span>
                        <div class="priority-picker">
                            <button @click="changePriority('low')" :class="{'pp-active': detailTask?.priority==='low'}" class="pp pp-low">Düşük</button>
                            <button @click="changePriority('medium')" :class="{'pp-active': detailTask?.priority==='medium'}" class="pp pp-med">Normal</button>
                            <button @click="changePriority('high')" :class="{'pp-active': detailTask?.priority==='high'}" class="pp pp-high">Yüksek</button>
                            <button @click="changePriority('critical')" :class="{'pp-active': detailTask?.priority==='critical'}" class="pp pp-crit">Kritik</button>
                        </div>
                    </div>
                    <label class="field">
                        <span class="field-label">Başlık</span>
                        <input type="text" x-model="editTask.title" class="field-input">
                    </label>
                    <label class="field">
                        <span class="field-label">Açıklama</span>
                        <textarea x-model="editTask.description" class="field-input" rows="2"></textarea>
                    </label>
                    <div class="field-row">
                        <label class="field half">
                            <span class="field-label">Kategori</span>
                            <input type="text" x-model="editTask.category" class="field-input" placeholder="Proje adı">
                        </label>
                        <label class="field half">
                            <span class="field-label">Bitiş tarihi</span>
                            <input type="date" x-model="editTask.dueDate" class="field-input">
                        </label>
                    </div>
                    <label class="field">
                        <span class="field-label">Etiketler</span>
                        <input type="text" x-model="editTask.tagsInput" class="field-input" placeholder="Virgülle ayır: tasarım, bug">
                    </label>
                </div>
                <div class="modal-foot">
                    <button @click="deleteCurrentTask()" class="btn-danger">Sil</button>
                    <div style="flex:1"></div>
                    <button @click="closeDetail()" class="btn-sec">İptal</button>
                    <button @click="saveDetail()" class="btn-pri">Kaydet</button>
                </div>
            </div>
        </template>
    </div>
</div>

</div>

<script>
function taskApp() {
    return {
        tasks: [],
        filter: 'all',
        searchQuery: '',
        sortField: 'createdAt',
        selectedCategory: null,
        showAddModal: false,
        showDetailModal: false,
        detailTask: null,
        editTask: { title:'', description:'', category:'', dueDate:'', tagsInput:'' },
        refreshTimer: null,
        clockTimer: null,
        nowTs: Date.now(),
        newTask: { title:'', description:'', priority:'medium', category:'', dueDate:'', tagsInput:'' },

        get activeCount() { return this.tasks.filter(t => t.status === 'active').length; },
        get inProgressCount() { return this.tasks.filter(t => t.status === 'in_progress').length; },
        get completedCount() { return this.tasks.filter(t => t.status === 'completed').length; },
        get overdueCount() { return this.tasks.filter(t => this.isOverdue(t)).length; },
        get completionRate() { return this.tasks.length === 0 ? 0 : (this.completedCount / this.tasks.length) * 100; },

        get categories() {
            const cats = new Set();
            this.tasks.forEach(t => { if (t.category) cats.add(t.category); });
            return [...cats].sort();
        },

        get sortedTasks() {
            let result = [...this.tasks];
            if (this.filter !== 'all') result = result.filter(t => t.status === this.filter);
            if (this.selectedCategory) result = result.filter(t => t.category === this.selectedCategory);
            if (this.searchQuery) {
                const q = this.searchQuery.toLowerCase();
                result = result.filter(t =>
                    t.title.toLowerCase().includes(q) ||
                    (t.description && t.description.toLowerCase().includes(q)) ||
                    (t.category && t.category.toLowerCase().includes(q)) ||
                    t.tags.some(tag => tag.toLowerCase().includes(q))
                );
            }
            const prio = { critical: 0, high: 1, medium: 2, low: 3 };
            if (this.sortField === 'priority') result.sort((a,b) => (prio[a.priority]||2) - (prio[b.priority]||2));
            else if (this.sortField === 'dueDate') result.sort((a,b) => (a.dueDate||Infinity) - (b.dueDate||Infinity));
            else result.sort((a,b) => b.createdAt - a.createdAt);
            return result;
        },

        async init() {
            const token = localStorage.getItem('token');
            if (!token) { location.href = '/login'; return; }
            await this.fetchTasks();
            this.refreshTimer = setInterval(() => this.fetchTasks(), 15000);
            this.clockTimer = setInterval(() => this.nowTs = Date.now(), 60000);
        },

        headers() { return { 'Authorization': 'Bearer ' + localStorage.getItem('token'), 'Content-Type': 'application/json' }; },

        async fetchTasks() {
            try {
                const r = await fetch('/api/tasks', { headers: this.headers() });
                if (r.status === 401) { location.href = '/login'; return; }
                this.tasks = await r.json();
            } catch {}
        },

        async addTask() {
            if (!this.newTask.title.trim()) return;
            const tags = this.newTask.tagsInput ? this.newTask.tagsInput.split(',').map(s=>s.trim()).filter(Boolean) : [];
            await fetch('/api/tasks', {
                method: 'POST', headers: this.headers(),
                body: JSON.stringify({
                    title: this.newTask.title, description: this.newTask.description || null,
                    priority: this.newTask.priority, source: 'web', category: this.newTask.category || null,
                    dueDate: this.newTask.dueDate ? new Date(this.newTask.dueDate).getTime() : null, tags
                })
            });
            this.newTask = { title:'', description:'', priority:'medium', category:'', dueDate:'', tagsInput:'' };
            this.showAddModal = false;
            await this.fetchTasks();
        },

        async toggleComplete(task) {
            const ns = task.status === 'completed' ? 'active' : 'completed';
            await fetch('/api/tasks/' + task.id, { method:'PATCH', headers:this.headers(), body:JSON.stringify({status:ns}) });
            await this.fetchTasks();
        },

        openDetail(task) {
            this.detailTask = task;
            this.editTask = {
                title: task.title, description: task.description || '',
                category: task.category || '', dueDate: task.dueDate ? new Date(task.dueDate).toISOString().split('T')[0] : '',
                tagsInput: task.tags.join(', ')
            };
            this.showDetailModal = true;
        },

        closeDetail() { this.showDetailModal = false; this.detailTask = null; },

        async changeStatus(s) {
            if (!this.detailTask) return;
            const body = { status: s };
            if (s === 'completed') body.completedAt = Date.now();
            else body.completedAt = null;
            await fetch('/api/tasks/' + this.detailTask.id, { method:'PATCH', headers:this.headers(), body:JSON.stringify(body) });
            await this.fetchTasks();
            this.detailTask = this.tasks.find(t => t.id === this.detailTask.id) || null;
        },

        async changePriority(p) {
            if (!this.detailTask) return;
            await fetch('/api/tasks/' + this.detailTask.id, { method:'PATCH', headers:this.headers(), body:JSON.stringify({priority:p}) });
            await this.fetchTasks();
            this.detailTask = this.tasks.find(t => t.id === this.detailTask.id) || null;
        },

        async saveDetail() {
            if (!this.detailTask) return;
            const tags = this.editTask.tagsInput ? this.editTask.tagsInput.split(',').map(s=>s.trim()).filter(Boolean) : [];
            await fetch('/api/tasks/' + this.detailTask.id, {
                method:'PATCH', headers:this.headers(),
                body:JSON.stringify({
                    title: this.editTask.title, description: this.editTask.description || null,
                    category: this.editTask.category || null,
                    dueDate: this.editTask.dueDate ? new Date(this.editTask.dueDate).getTime() : null, tags
                })
            });
            this.showDetailModal = false; this.detailTask = null;
            await this.fetchTasks();
        },

        async deleteCurrentTask() {
            if (!this.detailTask) return;
            if (!confirm('Bu task\'ı silmek istediğine emin misin?')) return;
            await fetch('/api/tasks/' + this.detailTask.id, { method:'DELETE', headers:this.headers() });
            this.showDetailModal = false; this.detailTask = null;
            await this.fetchTasks();
        },

        formatDue(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const now = new Date();
            const diff = d.setHours(0,0,0,0) - now.setHours(0,0,0,0);
            const days = Math.ceil(diff / 86400000);
            if (days < 0) return Math.abs(days) + ' gün gecikmiş';
            if (days === 0) return 'Bugün';
            if (days === 1) return 'Yarın';
            if (days < 7) return days + ' gün sonra';
            return d.toLocaleDateString('tr-TR', { day:'2-digit', month:'short' });
        },

        formatDate(ts) {
            const d = Date.now() - new Date(ts);
            if (d < 60000) return 'az önce';
            if (d < 3600000) return Math.floor(d/60000) + ' dk önce';
            if (d < 86400000) return Math.floor(d/3600000) + ' saat önce';
            return new Date(ts).toLocaleDateString('tr-TR', { day:'2-digit', month:'short' });
        },

        isOverdue(task) {
            return Boolean(task.dueDate && task.dueDate < this.nowTs && task.status !== 'completed' && task.status !== 'cancelled');
        },

        logout() { localStorage.removeItem('token'); location.href = '/login'; },

        handleKey(e) {
            if (e.key === 'Escape') {
                if (this.showDetailModal) this.closeDetail();
                else if (this.showAddModal) this.showAddModal = false;
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                document.querySelector('.search-input')?.focus();
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
                e.preventDefault();
                this.showAddModal = true;
            }
        }
    };
}
</script>
</body>
</html>
